<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Grid Layout Engine — Playground</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: #0f1117;
      color: #e1e4ea;
      line-height: 1.5;
    }

    header {
      padding: 24px 32px;
      border-bottom: 1px solid #1e2130;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 16px;
    }

    header h1 {
      font-size: 18px;
      font-weight: 600;
      color: #fff;
      letter-spacing: -0.3px;
    }

    header .badge {
      font-size: 11px;
      padding: 2px 8px;
      border-radius: 10px;
      background: #2563eb;
      color: #fff;
      font-weight: 500;
    }

    .controls {
      padding: 16px 32px;
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      border-bottom: 1px solid #1e2130;
    }

    button {
      padding: 6px 14px;
      border: 1px solid #2a2d3e;
      border-radius: 6px;
      background: #1a1d2e;
      color: #c8ccd6;
      font-size: 13px;
      cursor: pointer;
      transition: background 150ms, border-color 150ms;
    }

    button:hover { background: #252840; border-color: #3a3d5e; }
    button.active { background: #2563eb; border-color: #2563eb; color: #fff; }

    .main {
      display: flex;
      flex-wrap: wrap;
      gap: 0;
      min-height: calc(100vh - 200px);
    }

    .grid-section {
      flex: 1;
      min-width: 320px;
    }

    .code-section {
      width: 420px;
      min-width: 320px;
      border-left: 1px solid #1e2130;
      display: flex;
      flex-direction: column;
    }

    .code-section.collapsed {
      width: 48px;
      min-width: 48px;
    }

    .code-section.collapsed .code-content,
    .code-section.collapsed .code-label {
      display: none;
    }

    .code-toggle {
      padding: 8px 12px;
      background: #161825;
      border: none;
      border-bottom: 1px solid #1e2130;
      color: #5a6080;
      cursor: pointer;
      font-size: 12px;
      text-align: left;
    }

    .code-toggle:hover { color: #8b9cc7; }

    .code-label {
      padding: 12px 16px;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #5a6080;
      font-weight: 600;
      border-bottom: 1px solid #1e2130;
    }

    .code-content {
      flex: 1;
      padding: 16px;
      overflow: auto;
      font-family: "SF Mono", Monaco, "Cascadia Code", monospace;
      font-size: 12px;
      line-height: 1.6;
      color: #8b9cc7;
      background: #0d0f14;
    }

    .code-content pre {
      margin: 0;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .code-content .keyword { color: #c678dd; }
    .code-content .string { color: #98c379; }
    .code-content .number { color: #d19a66; }
    .code-content .comment { color: #5a6080; }

    .grid-container {
      margin: 24px 32px;
      border: 1px solid #1e2130;
      border-radius: 8px;
      background: #161825;
      overflow: hidden;
      min-height: 200px;
    }

    .grid-item {
      border-radius: 6px;
      background: #1e2747;
      border: 1px solid #2a3558;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
      font-weight: 500;
      color: #8b9cc7;
      user-select: none;
      overflow: hidden;
    }

    .grid-item.grid-static {
      background: #2a1a2e;
      border-color: #4a2858;
      color: #c88bd6;
    }

    .grid-item.grid-dragging {
      box-shadow: 0 8px 32px rgba(0,0,0,0.4);
      border-color: #4a6ebb;
      background: #243157;
    }

    .grid-item.grid-resizing {
      border-color: #4aad5e;
    }

    .grid-placeholder {
      background: #2563eb !important;
      opacity: 0.15 !important;
      border-radius: 6px;
    }

    .drop-source {
      margin: 0 32px 16px;
      padding: 12px 20px;
      background: #1a1d2e;
      border: 2px dashed #2a2d3e;
      border-radius: 8px;
      display: flex;
      align-items: center;
      gap: 12px;
      font-size: 13px;
      color: #8b9cc7;
    }

    .drop-source .draggable-box {
      width: 48px;
      height: 48px;
      border-radius: 6px;
      background: #2563eb;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      font-size: 18px;
      cursor: grab;
    }

    .status-bar {
      padding: 12px 32px;
      font-size: 12px;
      color: #5a6080;
      border-top: 1px solid #1e2130;
      font-family: "SF Mono", Monaco, "Cascadia Code", monospace;
    }

    .section-label {
      padding: 16px 32px 8px;
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #5a6080;
      font-weight: 600;
    }

    .scaled-wrapper {
      transform: scale(0.75);
      transform-origin: top left;
      width: 133.33%;
    }
  </style>
</head>
<body>
  <header>
    <h1>Grid Layout Engine</h1>
    <span class="badge">Playground</span>
  </header>

  <div class="controls" id="controls">
    <button data-demo="basic" class="active">Basic</button>
    <button data-demo="resize-handles">Resize Handles</button>
    <button data-demo="min-max">Min/Max Size</button>
    <button data-demo="overlap">Allow Overlap</button>
    <button data-demo="prevent">Prevent Collision</button>
    <button data-demo="bounded">Bounded Drag</button>
    <button data-demo="drop">Drop from Outside</button>
    <button data-demo="scale">Scaled Container</button>
    <button data-demo="absolute">Absolute Positioning</button>
    <button data-demo="horizontal">Horizontal Compact</button>
    <button data-demo="custom-compact">Custom Compactor</button>
    <button data-demo="add-remove">Add / Remove</button>
  </div>

  <div id="drop-zone" class="drop-source" style="display:none;">
    <div class="draggable-box" draggable="true" id="external-item">+</div>
    <span>Drag this item into the grid</span>
  </div>

  <div class="main">
    <div class="grid-section">
      <div class="section-label" id="section-label">Basic Grid — drag and resize items</div>
      <div class="grid-container" id="grid-container"></div>
      <div class="status-bar" id="status">Ready</div>
    </div>
    <div class="code-section" id="code-section">
      <button class="code-toggle" id="code-toggle">Hide code</button>
      <div class="code-label">Code</div>
      <div class="code-content" id="code-content"><pre id="code-pre"></pre></div>
    </div>
  </div>

  <script src="../dist/grid-layout-engine.min.js"></script>
  <script>
    const GLE = window.GridLayoutEngine;
    GLE.injectStyles();

    const container = document.getElementById("grid-container");
    const statusEl = document.getElementById("status");
    const sectionLabel = document.getElementById("section-label");
    const dropZone = document.getElementById("drop-zone");
    const codePre = document.getElementById("code-pre");
    const codeSection = document.getElementById("code-section");
    const codeToggle = document.getElementById("code-toggle");
    let grid = null;

    function status(msg) {
      statusEl.textContent = msg;
    }

    function clearGrid() {
      if (grid) { grid.destroy(); grid = null; }
      container.innerHTML = "";
      dropZone.style.display = "none";
    }

    function makeItem(id, label) {
      const el = document.createElement("div");
      el.textContent = label || id;
      return el;
    }

    function setCode(code) {
      codePre.textContent = code;
    }

    function activateDemo(name) {
      clearGrid();
      document.querySelectorAll("#controls button[data-demo]").forEach(b => {
        b.classList.toggle("active", b.dataset.demo === name);
      });
      const extraBtns = document.querySelectorAll("#controls button:not([data-demo])");
      extraBtns.forEach(b => b.remove());
      demos[name]();
    }

    const demos = {
      basic() {
        sectionLabel.textContent = "Basic Grid — drag and resize items";
        const layout = [
          { i: "a", x: 0, y: 0, w: 4, h: 2 },
          { i: "b", x: 4, y: 0, w: 4, h: 3 },
          { i: "c", x: 8, y: 0, w: 4, h: 2 },
          { i: "d", x: 0, y: 2, w: 6, h: 2, minW: 2, maxW: 8 },
          { i: "e", x: 6, y: 2, w: 6, h: 2 },
          { i: "static", x: 0, y: 4, w: 12, h: 1, static: true },
        ];

        grid = new GLE.GridLayout(container, {
          layout,
          gridConfig: { cols: 12, rowHeight: 60, margin: [8, 8], containerPadding: [8, 8] },
        });

        layout.forEach(item => {
          const el = makeItem(item.i, item.static ? "STATIC" : item.i.toUpperCase());
          grid.addItem(el, item);
        });

        grid.on("layoutChange", l => status("layout: " + l.map(i => `${i.i}(${i.x},${i.y})`).join(" ")));
        setCode(`const layout = [
  { i: "a", x: 0, y: 0, w: 4, h: 2 },
  { i: "b", x: 4, y: 0, w: 4, h: 3 },
  { i: "c", x: 8, y: 0, w: 4, h: 2 },
  { i: "d", x: 0, y: 2, w: 6, h: 2, minW: 2, maxW: 8 },
  { i: "e", x: 6, y: 2, w: 6, h: 2 },
  { i: "static", x: 0, y: 4, w: 12, h: 1, static: true },
];

const grid = new GLE.GridLayout(container, {
  layout,
  gridConfig: { cols: 12, rowHeight: 60, margin: [8, 8] },
});

layout.forEach(item => {
  const el = document.createElement("div");
  el.textContent = item.i;
  grid.addItem(el, item);
});`);
      },

      "resize-handles"() {
        sectionLabel.textContent = "All Resize Handles — resize from any edge or corner";
        const layout = [
          { i: "a", x: 0, y: 0, w: 4, h: 2 },
          { i: "b", x: 4, y: 0, w: 4, h: 2 },
          { i: "c", x: 8, y: 0, w: 4, h: 2 },
          { i: "d", x: 0, y: 2, w: 6, h: 2 },
        ];

        grid = new GLE.GridLayout(container, {
          layout,
          gridConfig: { cols: 12, rowHeight: 60, margin: [8, 8], containerPadding: [8, 8] },
          resizeConfig: { enabled: true, handles: ["se", "s", "e", "n", "w", "nw", "ne", "sw"] },
        });

        layout.forEach(item => {
          grid.addItem(makeItem(item.i, item.i.toUpperCase()), item);
        });

        grid.on("layoutChange", l => status("layout: " + l.map(i => `${i.i}(${i.w}×${i.h})`).join(" ")));
        setCode(`const layout = [
  { i: "a", x: 0, y: 0, w: 4, h: 2 },
  { i: "b", x: 4, y: 0, w: 4, h: 2 },
  ...
];

const grid = new GLE.GridLayout(container, {
  layout,
  gridConfig: { cols: 12, rowHeight: 60, margin: [8, 8] },
  resizeConfig: {
    enabled: true,
    handles: ["se", "s", "e", "n", "w", "nw", "ne", "sw"],
  },
});`);
      },

      "min-max"() {
        sectionLabel.textContent = "Min/Max Constraints — items respect size limits";
        const layout = [
          { i: "a", x: 0, y: 0, w: 3, h: 2, minW: 2, maxW: 6, minH: 1, maxH: 4 },
          { i: "b", x: 3, y: 0, w: 3, h: 2, minW: 1, maxW: 4 },
          { i: "c", x: 6, y: 0, w: 3, h: 2 },
          { i: "d", x: 9, y: 0, w: 3, h: 2, minW: 2, maxW: 5, minH: 2, maxH: 3 },
        ];

        grid = new GLE.GridLayout(container, {
          layout,
          gridConfig: { cols: 12, rowHeight: 60, margin: [8, 8], containerPadding: [8, 8] },
          resizeConfig: { enabled: true, handles: ["se"] },
        });

        layout.forEach(item => {
          const label = item.minW || item.maxW ? item.i + " (min/max)" : item.i;
          grid.addItem(makeItem(item.i, label.toUpperCase()), item);
        });

        grid.on("layoutChange", l => status("layout: " + l.map(i => `${i.i}(${i.w}×${i.h})`).join(" ")));
        setCode(`const layout = [
  { i: "a", x: 0, y: 0, w: 3, h: 2, minW: 2, maxW: 6, minH: 1, maxH: 4 },
  { i: "b", x: 3, y: 0, w: 3, h: 2, minW: 1, maxW: 4 },
  { i: "d", x: 9, y: 0, w: 3, h: 2, minW: 2, maxW: 5, minH: 2, maxH: 3 },
];

// minW, maxW, minH, maxH are enforced during resize`);
      },

      overlap() {
        sectionLabel.textContent = "Allow Overlap — items can stack on top of each other";
        const layout = [
          { i: "a", x: 0, y: 0, w: 4, h: 2 },
          { i: "b", x: 2, y: 1, w: 4, h: 2 },
          { i: "c", x: 6, y: 0, w: 4, h: 3 },
          { i: "d", x: 0, y: 3, w: 6, h: 2 },
        ];

        grid = new GLE.GridLayout(container, {
          layout,
          gridConfig: { cols: 12, rowHeight: 60, margin: [8, 8], containerPadding: [8, 8] },
          compactor: GLE.getCompactor("vertical", true),
        });

        layout.forEach(item => {
          grid.addItem(makeItem(item.i, item.i.toUpperCase()), item);
        });

        grid.on("layoutChange", () => status("allowOverlap: items may overlap freely"));
        setCode(`grid = new GLE.GridLayout(container, {
  layout,
  gridConfig: { cols: 12, rowHeight: 60, margin: [8, 8] },
  compactor: GLE.getCompactor("vertical", true),
});

// Second arg: allowOverlap = true`);
      },

      prevent() {
        sectionLabel.textContent = "Prevent Collision — dragged item reverts if it would collide";
        const layout = [
          { i: "a", x: 0, y: 0, w: 3, h: 2 },
          { i: "b", x: 3, y: 0, w: 3, h: 2 },
          { i: "c", x: 6, y: 0, w: 3, h: 2 },
          { i: "d", x: 9, y: 0, w: 3, h: 2 },
          { i: "e", x: 0, y: 2, w: 6, h: 2 },
          { i: "f", x: 6, y: 2, w: 6, h: 2 },
        ];

        grid = new GLE.GridLayout(container, {
          layout,
          gridConfig: { cols: 12, rowHeight: 60, margin: [8, 8], containerPadding: [8, 8] },
          compactor: GLE.getCompactor("vertical", false, true),
        });

        layout.forEach(item => {
          grid.addItem(makeItem(item.i, item.i.toUpperCase()), item);
        });

        status("preventCollision: drag will revert on collision");
        setCode(`compactor: GLE.getCompactor("vertical", false, true)

// Third arg: preventCollision = true
// When drag would overlap another item, it reverts`);
      },

      bounded() {
        sectionLabel.textContent = "Bounded Drag — items cannot be dragged outside the container";
        const layout = [
          { i: "a", x: 0, y: 0, w: 3, h: 2 },
          { i: "b", x: 4, y: 0, w: 4, h: 2, isBounded: true },
          { i: "c", x: 8, y: 0, w: 4, h: 3 },
        ];

        grid = new GLE.GridLayout(container, {
          layout,
          gridConfig: { cols: 12, rowHeight: 60, margin: [8, 8], containerPadding: [8, 8] },
          dragConfig: { enabled: true, bounded: true },
        });

        layout.forEach(item => {
          grid.addItem(makeItem(item.i, item.i.toUpperCase() + (item.isBounded ? " (bounded)" : "")), item);
        });

        status("All items bounded to container edges");
        setCode(`dragConfig: { enabled: true, bounded: true }

// Or per-item: { i: "b", ..., isBounded: true }`);
      },

      drop() {
        sectionLabel.textContent = "Drop from Outside — drag external elements into the grid";
        dropZone.style.display = "flex";

        const layout = [
          { i: "a", x: 0, y: 0, w: 4, h: 2 },
          { i: "b", x: 4, y: 0, w: 4, h: 2 },
        ];

        grid = new GLE.GridLayout(container, {
          layout,
          gridConfig: { cols: 12, rowHeight: 60, margin: [8, 8], containerPadding: [8, 8] },
          dropConfig: { enabled: true, defaultItem: { w: 3, h: 2 } },
        });

        layout.forEach(item => {
          grid.addItem(makeItem(item.i, item.i.toUpperCase()), item);
        });

        let dropCount = 0;
        grid.on("drop", (newLayout, droppedItem, e) => {
          dropCount++;
          const id = "dropped-" + dropCount;
          const el = makeItem(id, "NEW " + dropCount);
          grid.addItem(el, { ...droppedItem, i: id });
          status("Dropped item " + id + " at (" + droppedItem.x + "," + droppedItem.y + ")");
        });

        status("Drag the blue + box into the grid");
        setCode(`dropConfig: { enabled: true, defaultItem: { w: 3, h: 2 } }

grid.on("drop", (newLayout, droppedItem, e) => {
  const el = document.createElement("div");
  el.textContent = "NEW";
  grid.addItem(el, { ...droppedItem, i: "dropped-1" });
});`);
      },

      scale() {
        sectionLabel.textContent = "Scaled Container — grid inside a CSS-scaled parent (0.75x)";
        container.innerHTML = '<div class="scaled-wrapper" id="scaled-inner"></div>';
        const inner = document.getElementById("scaled-inner");

        const layout = [
          { i: "a", x: 0, y: 0, w: 4, h: 2 },
          { i: "b", x: 4, y: 0, w: 4, h: 2 },
          { i: "c", x: 8, y: 0, w: 4, h: 3 },
          { i: "d", x: 0, y: 2, w: 6, h: 2 },
        ];

        grid = new GLE.GridLayout(inner, {
          layout,
          gridConfig: { cols: 12, rowHeight: 60, margin: [8, 8], containerPadding: [8, 8] },
          positionStrategy: GLE.createScaledStrategy(0.75),
        });

        layout.forEach(item => {
          grid.addItem(makeItem(item.i, item.i.toUpperCase()), item);
        });

        status("transformScale: 0.75 — drag coordinates are adjusted for scale");
        setCode(`positionStrategy: GLE.createScaledStrategy(0.75)

// Use when grid is inside a CSS-scaled parent
// (e.g. transform: scale(0.75) or zoom)`);
      },

      absolute() {
        sectionLabel.textContent = "Absolute Positioning — uses top/left instead of CSS transforms";
        const layout = [
          { i: "a", x: 0, y: 0, w: 4, h: 2 },
          { i: "b", x: 4, y: 0, w: 4, h: 3 },
          { i: "c", x: 8, y: 0, w: 4, h: 2 },
          { i: "d", x: 0, y: 3, w: 12, h: 2 },
        ];

        grid = new GLE.GridLayout(container, {
          layout,
          gridConfig: { cols: 12, rowHeight: 60, margin: [8, 8], containerPadding: [8, 8] },
          positionStrategy: GLE.absoluteStrategy,
        });

        layout.forEach(item => {
          grid.addItem(makeItem(item.i, item.i.toUpperCase()), item);
        });

        status("positionStrategy: absolute (top/left instead of translate)");
        setCode(`positionStrategy: GLE.absoluteStrategy

// Use when transforms cause issues (e.g. printing, nested transforms)`);
      },

      horizontal() {
        sectionLabel.textContent = "Horizontal Compaction — items compact to the left";
        const layout = [
          { i: "a", x: 2, y: 0, w: 2, h: 2 },
          { i: "b", x: 6, y: 0, w: 2, h: 3 },
          { i: "c", x: 10, y: 0, w: 2, h: 2 },
          { i: "d", x: 4, y: 2, w: 3, h: 2 },
          { i: "e", x: 8, y: 2, w: 3, h: 2 },
        ];

        grid = new GLE.GridLayout(container, {
          layout,
          gridConfig: { cols: 12, rowHeight: 60, margin: [8, 8], containerPadding: [8, 8] },
          compactor: GLE.horizontalCompactor,
        });

        layout.forEach(item => {
          grid.addItem(makeItem(item.i, item.i.toUpperCase()), item);
        });

        status("compactor: horizontal — items float left");
        setCode(`compactor: GLE.horizontalCompactor

// Items compact horizontally (leftward)`);
      },

      "custom-compact"() {
        sectionLabel.textContent = "Custom Compactor — reverseVertical pushes items to the bottom";
        const maxRows = 8;

        const reverseVerticalCompactor = {
          type: "vertical",
          allowOverlap: false,
          compact(layout, cols) {
            const clone = layout.map(item => ({ ...item }));
            clone.sort((a, b) => (b.y + b.h) - (a.y + a.h) || b.x - a.x);
            for (const item of clone) {
              if (item.static) continue;
              while (item.y + item.h < maxRows) {
                item.y++;
                const collision = clone.some(other =>
                  other !== item &&
                  item.x < other.x + other.w && item.x + item.w > other.x &&
                  item.y < other.y + other.h && item.y + item.h > other.y
                );
                if (collision) { item.y--; break; }
              }
            }
            return clone;
          },
        };

        const layout = [
          { i: "a", x: 0, y: 0, w: 4, h: 2 },
          { i: "b", x: 4, y: 0, w: 4, h: 2 },
          { i: "c", x: 8, y: 0, w: 4, h: 2 },
          { i: "d", x: 0, y: 2, w: 6, h: 1 },
        ];

        grid = new GLE.GridLayout(container, {
          layout,
          gridConfig: { cols: 12, rowHeight: 60, maxRows, margin: [8, 8], containerPadding: [8, 8] },
          compactor: reverseVerticalCompactor,
        });

        layout.forEach(item => {
          grid.addItem(makeItem(item.i, item.i.toUpperCase()), item);
        });

        status("Custom compactor: items sink to the bottom (gravity)");
        setCode(`const reverseVerticalCompactor = {
  type: "vertical",
  allowOverlap: false,
  compact(layout, cols) {
    const clone = layout.map(item => ({ ...item }));
    clone.sort((a, b) => (b.y + b.h) - (a.y + a.h));
    // ... push items down to maxRows
    return clone;
  },
};`);
      },

      "add-remove"() {
        sectionLabel.textContent = "Add / Remove Items — dynamically modify the grid";
        let count = 0;

        const layout = [
          { i: "item-1", x: 0, y: 0, w: 4, h: 2 },
          { i: "item-2", x: 4, y: 0, w: 4, h: 2 },
        ];
        count = 2;

        grid = new GLE.GridLayout(container, {
          layout,
          gridConfig: { cols: 12, rowHeight: 60, margin: [8, 8], containerPadding: [8, 8] },
        });

        layout.forEach(item => {
          const el = makeItem(item.i, item.i);
          el.addEventListener("dblclick", () => {
            grid.removeItem(item.i);
            status("Removed " + item.i);
          });
          grid.addItem(el, item);
        });

        const addBtn = document.createElement("button");
        addBtn.textContent = "+ Add Item";
        addBtn.style.marginLeft = "32px";
        addBtn.style.marginBottom = "8px";
        document.getElementById("controls").appendChild(addBtn);

        addBtn.addEventListener("click", () => {
          count++;
          const id = "item-" + count;
          const el = makeItem(id, id);
          el.addEventListener("dblclick", () => {
            grid.removeItem(id);
            status("Removed " + id);
          });
          grid.addItem(el, { i: id, x: 0, y: Infinity, w: 3, h: 2 });
          status("Added " + id + " — double-click any item to remove");
        });

        status("Click + Add Item or double-click an item to remove it");
        setCode(`grid.addItem(el, { i: id, x: 0, y: Infinity, w: 3, h: 2 });
// y: Infinity places at bottom

grid.removeItem(id);`);
      },
    };

    codeToggle.addEventListener("click", () => {
      codeSection.classList.toggle("collapsed");
      codeToggle.textContent = codeSection.classList.contains("collapsed") ? "Show code" : "Hide code";
    });

    document.getElementById("controls").addEventListener("click", e => {
      const btn = e.target.closest("button[data-demo]");
      if (btn) activateDemo(btn.dataset.demo);
    });

    activateDemo("basic");
  </script>
</body>
</html>
